name: Update tour calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

concurrency:
  group: update-tour-calendar
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate artist config from bands.txt
        run: python scripts/bands_to_artists.py

      - name: Update calendar
        run: python scripts/update_calendar.py

      - name: Commit updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/artists.yml calendar.ics events.json index.html data/last_update.json
          if git diff --cached --quiet; then
            echo "No calendar changes."
          else
            git commit -m "Update tour calendar"
            git push
          fi
